services:
  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://agencyforge:agencyforge@postgres:5432/agencyforge?sslmode=disable

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agencyforge
      POSTGRES_PASSWORD: agencyforge
      POSTGRES_DB: agencyforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agencyforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

<svg width="100%" viewBox="0 0 680 690" xmlns="http://www.w3.org/2000/svg">


<rect width="680" height="680" rx="140" style="fill:rgb(247, 245, 240);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Outer ring — thin track -->
<circle cx="340" cy="340" r="230" fill="none" stroke="#d4d0c8" stroke-width="1.5" style="fill:none;stroke:rgb(212, 208, 200);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Six agent arc segments, evenly spaced, thin gaps -->

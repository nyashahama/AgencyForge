<circle cx="340" cy="340" r="230" fill="none" stroke="#c8ff00" stroke-width="22" stroke-dasharray="210 18" stroke-dashoffset="0" stroke-linecap="butt" transform="rotate(-90 340 340)" style="fill:none;stroke:rgb(200, 255, 0);color:rgb(0, 0, 0);stroke-width:22px;stroke-dasharray:210px, 18px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

